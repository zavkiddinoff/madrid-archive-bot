services:
  - type: web
    name: real-madrid-arxiv-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # Render dashboard'dan qo'shasiz
      - key: ADMIN_ID
        sync: false          # Render dashboard'dan qo'shasiz
      - key: MONGO_URI
        sync: false          # MongoDB Atlas'dan olgan URI
    plan: free
